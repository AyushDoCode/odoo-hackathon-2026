<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AssetFlow by odoo</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="assets/api.js"></script>
</head>
<body>
    <div class="login-container">
        <img src="assets/images/blob.svg" alt="" class="corner-blob">

        <p class="form-subtitle">Please enter your details</p>
        <h2 class="form-title">Create Account</h2>

        <p id="form-error" style="display:none;color:#ba1a1a;font-size:0.85rem;margin-bottom:1rem;"></p>

        <form id="signup-form" class="login-form">
            <div class="input-wrapper">
                <input type="text" id="fullname" class="input-field" placeholder=" " required>
                <label for="fullname" class="input-label">Full name</label>
            </div>

            <div class="input-wrapper">
                <input type="email" id="email" class="input-field" placeholder=" " required>
                <label for="email" class="input-label">Email address</label>
            </div>

            <div class="input-wrapper">
                <input type="password" id="password" class="input-field password-field" placeholder=" " required minlength="8">
                <label for="password" class="input-label">Password</label>
                <i class='bx bx-hide eye-icon'></i>
            </div>

            <div class="input-wrapper">
                <input type="password" id="confirm-password" class="input-field password-field" placeholder=" " required minlength="8">
                <label for="confirm-password" class="input-label">Confirm password</label>
                <i class='bx bx-hide eye-icon'></i>
            </div>

            <button type="submit" class="login-button" id="signup-button">Sign Up</button>
        </form>

        <p class="signup-text">Already have an account? <a href="index.html">Sign in</a></p>
    </div>

    <script>
        document.querySelectorAll(".eye-icon").forEach(icon => {
            icon.addEventListener("click", () => {
                const field = icon.parentElement.querySelector(".password-field");
                const isHidden = field.type === "password";
                field.type = isHidden ? "text" : "password";
                icon.classList.toggle("bx-hide", !isHidden);
                icon.classList.toggle("bx-show", isHidden);
            });
        });

        if (window.AssetFlowAPI && window.AssetFlowAPI.getToken()) {
            window.location.href = "dashboard.html";
        }

        const errorEl = document.getElementById("form-error");
        function showError(message) {
            errorEl.textContent = message;
            errorEl.style.display = "block";
        }

        document.getElementById("signup-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            errorEl.style.display = "none";
            const button = document.getElementById("signup-button");
            const name = document.getElementById("fullname").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;

            if (password !== confirmPassword) {
                showError("Passwords do not match.");
                return;
            }
            if (password.length < 8) {
                showError("Password must be at least 8 characters.");
                return;
            }

            button.disabled = true;
            button.textContent = "Creating account...";
            try {
                await window.AssetFlowAPI.signup(name, email, password);
                window.location.href = "dashboard.html";
            } catch (err) {
                showError(err.message || "Sign up failed. Please try again.");
                button.disabled = false;
                button.textContent = "Sign Up";
            }
        });
    </script>

</body>
</html>
